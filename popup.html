<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  
  <style>
    :root {
      --bg:#1a1f2e; --surface:#222840; --surface2:#2a3150;
      --border:#363f5e; --accent:#00c2ff; --accent2:#7c6aff;
      --green:#00e5a0; --yellow:#ffb800; --red:#ff4d6a;
      --text:#eef0f8; --muted:#8e9bbf;
      --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
    }
    body.light {
      --bg:#f0f4f8; --surface:#ffffff; --surface2:#e8edf5;
      --border:#d0d8e8; --accent:#0077cc; --accent2:#6554c0;
      --green:#0a8a5e; --yellow:#b07800; --red:#cc2244;
      --text:#1a2035; --muted:#5a6a8a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{width:620px;font-family:var(--font);background:var(--bg);color:var(--text);min-height:100px;}

    /* HEADER */
    .header{background:var(--surface);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
    .header-left{display:flex;align-items:center;gap:10px;}
    .logo-dot{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;}
    .header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;}
    .header-sub{font-size:11px;color:var(--muted);margin-top:1px;}
    .version-badge{background:var(--surface2);border:1px solid var(--border);color:var(--accent);font-size:9px;font-family:var(--mono);padding:3px 8px;border-radius:20px;}

    /* TABS */
    .nav-tabs{background:var(--surface);display:flex;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);padding:0 4px;}
    .nav-tabs::-webkit-scrollbar{display:none;}
    .tab-btn{background:none;border:none;color:var(--muted);padding:12px 16px;font-size:11px;font-weight:600;font-family:var(--font);text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;flex-shrink:0;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;}
    .tab-btn:hover{color:var(--text);}
    .tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent);}

    /* CONTAINERS */
    .container{display:none;padding:16px;grid-template-columns:1fr 1fr;gap:12px;max-height:520px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
    .container.active{display:grid;}
    .container::-webkit-scrollbar{width:4px;}
    .container::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

    /* SECTION TITLE */
    .section-title{grid-column:span 2;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:8px 0 4px;display:flex;justify-content:space-between;align-items:center;}
    .st-inner{display:flex;align-items:center;}
    .st-inner::before{content:'';display:inline-block;width:3px;height:10px;background:linear-gradient(to bottom,var(--accent),var(--accent2));border-radius:2px;margin-right:7px;flex-shrink:0;}

    /* CARDS */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;transition:border-color .2s;}
    .card:hover{border-color:#3a4a66;}
    .full{grid-column:span 2;}

    /* HEALTH LINE */
    .hl{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:9px 0;border-bottom:1px solid var(--border);}
    .hl:last-child{border-bottom:none;padding-bottom:0;}
    .hl:first-child{padding-top:0;}

    /* BADGES */
    .badge{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:700;font-family:var(--mono);flex-shrink:0;}
    .ok{background:rgba(0,229,160,.15);color:var(--green);border:1px solid rgba(0,229,160,.3);}
    .warn{background:rgba(255,184,0,.15);color:var(--yellow);border:1px solid rgba(255,184,0,.3);}
    .err{background:rgba(255,77,106,.15);color:var(--red);border:1px solid rgba(255,77,106,.3);}
    .info{background:rgba(0,194,255,.15);color:var(--accent);border:1px solid rgba(0,194,255,.3);}

    /* LABEL / VALUE */
    .label{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.5px;}
    .label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .value{font-size:13px;color:var(--text);line-height:1.6;word-break:break-word;}

    /* BUTTONS */
    .copy-btn{background:rgba(0,194,255,.1);color:var(--accent);border:1px solid rgba(0,194,255,.3);padding:3px 10px;border-radius:6px;font-size:9px;cursor:pointer;font-weight:600;font-family:var(--font);transition:background .2s;}
    .copy-btn:hover{background:rgba(0,194,255,.2);}
    .check-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none;padding:9px 16px;border-radius:8px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;width:100%;margin-top:8px;transition:opacity .2s;}
    .check-btn:hover{opacity:.9;}
    .check-btn:disabled{opacity:.4;cursor:not-allowed;}
    .export-btn{grid-column:span 2;background:linear-gradient(135deg,var(--green),var(--accent));color:#0e1117;border:none;padding:11px;border-radius:8px;font-size:12px;font-weight:700;font-family:var(--font);cursor:pointer;width:100%;}
    .store-btn{grid-column:span 2;background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;border:none;padding:10px;border-radius:8px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;width:100%;}

    /* SCORE */
    .score-wrap{grid-column:span 2;display:flex;align-items:center;gap:16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;}
    .score-ring{position:relative;width:72px;height:72px;flex-shrink:0;}
    .score-ring svg{transform:rotate(-90deg);}
    .score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:700;font-family:var(--mono);}
    .score-title{font-size:15px;font-weight:700;margin-bottom:3px;}
    .score-sub{font-size:11px;color:var(--muted);}

    /* INFO BAR */
    .info-bar{grid-column:span 2;display:flex;justify-content:space-around;background:var(--surface2);padding:12px;border-radius:10px;border:1px solid var(--border);}
    .info-item{text-align:center;}
    .info-item b{font-size:22px;font-weight:700;font-family:var(--mono);color:var(--accent);display:block;}
    .info-item small{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}

    /* SHORTCUTS */
    .shortcuts-grid{grid-column:span 2;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .shortcut-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text);font-size:10px;font-weight:600;font-family:var(--font);}
    .shortcut-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,194,255,.07);}
    .shortcut-icon{font-size:16px;display:block;margin-bottom:4px;}

    /* LINK ITEMS */
    .link-item{font-size:10px;font-family:var(--mono);padding:7px 10px;border-radius:7px;margin-bottom:5px;word-break:break-all;line-height:1.5;}
    .link-broken{background:rgba(255,77,106,.08);border-left:3px solid var(--red);}
    .link-status{font-weight:700;font-size:9px;float:right;margin-left:6px;padding:2px 6px;border-radius:4px;background:rgba(255,77,106,.2);color:var(--red);}

    /* PROGRESS */
    .progress-wrap{background:var(--border);border-radius:10px;height:4px;margin:10px 0 6px;overflow:hidden;}
    .progress-bar{background:linear-gradient(90deg,var(--accent),var(--accent2));height:4px;border-radius:10px;transition:width .3s;}

    /* HREFLANG */
    .hreflang-row{display:flex;gap:10px;font-size:11px;padding:7px 0;border-bottom:1px solid var(--border);align-items:flex-start;}
    .hreflang-row:last-child{border-bottom:none;}
    .hreflang-lang{font-weight:700;font-family:var(--mono);color:var(--accent);min-width:55px;font-size:10px;}
    .hreflang-url{color:var(--muted);font-size:10px;word-break:break-all;font-family:var(--mono);}

    /* SPEED */
    .strategy-toggle{grid-column:span 2;display:flex;gap:8px;}
    .strategy-btn{flex:1;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;font-family:var(--font);cursor:pointer;transition:all .2s;}
    .strategy-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,194,255,.08);}
    .vital-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;position:relative;overflow:hidden;}
    .vital-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .vital-good::before{background:var(--green);}
    .vital-avg::before{background:var(--yellow);}
    .vital-poor::before{background:var(--red);}
    .vital-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
    .vital-value{font-size:22px;font-weight:700;font-family:var(--mono);}
    .vital-good .vital-value{color:var(--green);}
    .vital-avg .vital-value{color:var(--yellow);}
    .vital-poor .vital-value{color:var(--red);}
    .vital-unit{font-size:10px;color:var(--muted);margin-top:3px;}
    .score-bar-wrap{background:var(--border);border-radius:6px;height:8px;margin:6px 0 3px;overflow:hidden;}
    .score-bar-fill{height:8px;border-radius:6px;transition:width .6s ease;}

    /* KEYWORDS */
    .kw-row{display:flex;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;}
    .kw-row:last-child{border-bottom:none;}
    .kw-word{min-width:110px;font-weight:600;color:var(--text);font-family:var(--mono);font-size:11px;}
    .kw-bar-wrap{background:var(--border);border-radius:4px;height:6px;flex:1;overflow:hidden;margin:0 10px;}
    .kw-bar-fill{height:6px;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
    .kw-count{min-width:30px;text-align:right;font-size:10px;color:var(--muted);font-family:var(--mono);}
    .kw-pct{min-width:38px;text-align:right;font-size:10px;color:var(--accent);font-family:var(--mono);font-weight:600;}

    /* RECOMMENDATIONS */
    .rec-item{grid-column:span 2;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;display:flex;gap:12px;align-items:flex-start;}
    .rec-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
    .rec-title{font-size:12px;font-weight:700;margin-bottom:3px;}
    .rec-body{font-size:11px;color:var(--muted);line-height:1.5;}
    .rec-error{border-left:3px solid var(--red);}
    .rec-warn{border-left:3px solid var(--yellow);}
    .rec-good{border-left:3px solid var(--green);}

    /* HEADINGS TREE */
    .h-node{display:flex;align-items:baseline;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;}
    .h-node:last-child{border-bottom:none;}
    .h-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;}
    .h1-tag{background:rgba(0,194,255,.15);color:var(--accent);}
    .h2-tag{background:rgba(124,106,255,.15);color:var(--accent2);}
    .h3-tag{background:rgba(0,229,160,.15);color:var(--green);}
    .h456-tag{background:rgba(255,184,0,.15);color:var(--yellow);}
    .h-text{flex:1;color:var(--text);word-break:break-word;}

    /* COMPARE */
    .compare-row{display:flex;justify-content:space-between;font-size:11px;padding:6px 0;border-bottom:1px solid var(--border);}
    .compare-row:last-child{border-bottom:none;}
    .c-win{color:var(--green);font-weight:700;}
    .c-lose{color:var(--red);}
    .c-tie{color:var(--muted);}
    .c-label{color:var(--muted);font-size:10px;}

    /* SETTINGS */
    .setting-row{grid-column:span 2;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px;}
    .setting-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:8px;}
    .setting-val{color:var(--accent);font-family:var(--mono);font-size:11px;}
    input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
    input[type=text]{transition:border-color .2s;}
    input[type=text]:focus{border-color:var(--accent)!important;}
    .save-btn{grid-column:span 2;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#0e1117;border:none;padding:10px;border-radius:8px;font-size:11px;font-weight:700;font-family:var(--font);cursor:pointer;width:100%;}

    /* READABILITY */
    .read-score{font-size:32px;font-weight:700;font-family:var(--mono);}

    /* LINK MAP */
    #linkmapCanvas{grid-column:span 2;width:100%;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:block;}

    /* SERP PREVIEW */
    .serp-wrap{grid-column:span 2;background:white;border-radius:12px;padding:18px 20px;border:1px solid #ddd;font-family:Arial,sans-serif;}
    body.light .serp-wrap{background:#fff;border-color:#ccc;}
    .serp-url{font-size:12px;color:#006621;margin-bottom:2px;word-break:break-all;}
    .serp-title{font-size:18px;color:#1a0dab;font-weight:400;margin-bottom:4px;cursor:pointer;line-height:1.3;}
    .serp-title:hover{text-decoration:underline;}
    .serp-title.too-long{color:#e74c3c;}
    .serp-desc{font-size:13px;color:#545454;line-height:1.5;}
    .serp-desc.too-long{color:#e74c3c;}
    .serp-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;border-radius:4px;margin-left:8px;}
    .serp-ok{background:#e6f4ea;color:#0a8a5e;}
    .serp-warn{background:#fff3e0;color:#b07800;}
    .serp-err{background:#fce8ea;color:#cc2244;}

    /* SOCIAL PREVIEW CARDS */
    .fb-card{grid-column:span 2;border:1px solid #dddfe2;border-radius:0 0 8px 8px;overflow:hidden;font-family:Helvetica,Arial,sans-serif;background:#f2f3f5;}
    .fb-img{width:100%;height:120px;background:linear-gradient(135deg,var(--surface2),var(--border));display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--muted);}
    .fb-body{padding:10px 12px;background:#f2f3f5;}
    .fb-domain{font-size:10px;color:#606770;text-transform:uppercase;margin-bottom:3px;}
    .fb-title{font-size:13px;font-weight:700;color:#1c1e21;margin-bottom:3px;line-height:1.3;}
    .fb-desc{font-size:12px;color:#606770;line-height:1.4;}
    .tw-card{grid-column:span 2;border:1px solid #cfd9de;border-radius:14px;overflow:hidden;font-family:-apple-system,sans-serif;background:white;}
    .tw-img{width:100%;height:110px;background:linear-gradient(135deg,var(--surface2),var(--border));display:flex;align-items:center;justify-content:center;font-size:32px;}
    .tw-body{padding:10px 12px;}
    .tw-title{font-size:13px;font-weight:700;color:#0f1419;margin-bottom:2px;}
    .tw-desc{font-size:12px;color:#536471;margin-bottom:4px;line-height:1.4;}
    .tw-domain{font-size:12px;color:#536471;}

    /* HISTORY */
    .hist-item{grid-column:span 2;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:border-color .2s;}
    .hist-item:hover{border-color:var(--accent);}
    .hist-url{font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hist-meta{display:flex;gap:10px;font-size:10px;color:var(--muted);}
    .hist-score{font-weight:700;font-family:var(--mono);}

    /* FOOTER */
    .footer{font-size:10px;text-align:center;color:var(--muted);padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);line-height:1.6;}
    .footer b{color:var(--text);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
    @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
    .card{animation:fadeUp .2s ease both;}
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <div class="logo-dot">⚡</div>
      <div><div class="header-title">SEO Auditor Pro</div><div class="header-sub">by Viraj Singh</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="themeToggle" title="Toggle light/dark mode" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">🌙</button>
      <span class="version-badge">v2.0</span>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="headings">Headings</button>
    <button class="tab-btn" data-tab="links">Links</button>
    <button class="tab-btn" data-tab="images">Images</button>
    <button class="tab-btn" data-tab="schema">Schema</button>
    <button class="tab-btn" data-tab="social">Social</button>
    <button class="tab-btn" data-tab="hreflang">Hreflang</button>
    <button class="tab-btn" data-tab="speed">Speed ⚡</button>
    <button class="tab-btn" data-tab="keywords">Keywords</button>
    <button class="tab-btn" data-tab="tips">Tips 💡</button>
    <button class="tab-btn" data-tab="compare">Compare 🆚</button>
    <button class="tab-btn" data-tab="linkmap">Link Map</button>
    <button class="tab-btn" data-tab="settings">Settings ⚙️</button>
    <button class="tab-btn" data-tab="serp">SERP 🔎</button>
    <button class="tab-btn" data-tab="history">History 🕓</button>
  </div>
  <div id="overview"  class="container active"></div>
  <div id="headings"  class="container"></div>
  <div id="links"     class="container"></div>
  <div id="images"    class="container"></div>
  <div id="schema"    class="container"></div>
  <div id="social"    class="container"></div>
  <div id="hreflang"  class="container"></div>
  <div id="speed"     class="container"></div>
  <div id="keywords"  class="container"></div>
  <div id="tips"      class="container"></div>
  <div id="compare"   class="container"></div>
  <div id="linkmap"   class="container"></div>
  <div id="settings"  class="container"></div>
  <div id="serp"      class="container"></div>
  <div id="history"   class="container"></div>
  <div class="footer"><b>SEO Auditor Pro</b> · Developed by Viraj Singh</div>
  <script src="popup.js"></script>
</body>
</html>
